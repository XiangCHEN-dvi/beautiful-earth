<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texture vs Globe — Compare</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        display: flex;
        min-height: 100vh;
        background: #0a1020;
        color: #c8d0e0;
        font-family: system-ui, sans-serif;
      }
      section {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        gap: 0.75rem;
      }
      h2 {
        font-size: 0.85rem;
        font-weight: 600;
        opacity: 0.8;
      }
      img {
        max-width: 100%;
        max-height: calc(100vh - 4rem);
        object-fit: contain;
        border: 1px solid #2a3550;
      }
      iframe {
        width: 100%;
        height: calc(100vh - 4rem);
        border: 1px solid #2a3550;
        background: #0a1020;
      }
      a {
        color: #8ab4f8;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <section>
      <h2>earth-day.jpg（文件原图）</h2>
      <img src="./assets/earth-day.jpg" alt="earth-day.jpg source file" />
    </section>
    <section>
      <h2>3D 地球（当前站点）</h2>
      <iframe src="./index.html" title="2.5D Earth globe"></iframe>
      <a href="./index.html">单独打开地球页</a>
    </section>
  </body>
</html>
