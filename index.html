<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2.5D Earth</title>
    <meta
      name="description"
      content="Interactive 3D globe — self-hosted imagery, no map cloud APIs."
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="globe-canvas" aria-label="Interactive 3D Earth"></canvas>
      <div id="hud" aria-hidden="true">
        <p class="hud-title">2.5D Earth</p>
        <p class="hud-hint">Drag to rotate · Scroll to zoom</p>
      </div>
      <footer id="credits">
        <a href="https://www.solarsystemscope.com/textures/" rel="license"
          >Earth textures © Solar System Scope</a
        >
        ·
        <a href="https://creativecommons.org/licenses/by/4.0/" rel="license"
          >CC BY 4.0</a
        >
      </footer>
      <p id="loading" role="status">Loading Earth…</p>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
